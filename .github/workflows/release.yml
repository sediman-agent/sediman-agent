name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

jobs:
  build-tui:
    name: Build TUI binary (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-latest
            artifact: sediman-tui-aarch64-macos
          - target: x86_64-apple-darwin
            runner: macos-13
            artifact: sediman-tui-x86_64-macos
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            artifact: sediman-tui-x86_64-linux
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Build
        run: cargo build --release -p sediman-tui --target ${{ matrix.target }}
      - name: Package
        run: |
          mkdir -p dist/bin
          cp target/${{ matrix.target }}/release/sediman-tui dist/bin/terminator
          cd dist && tar czf ${{ matrix.artifact }}.tar.gz bin/
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}.tar.gz

  build-wheel:
    name: Build Python wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - name: Build wheel
        run: uv build
      - uses: actions/upload-artifact@v4
        with:
          name: python-wheel
          path: dist/*.whl

  build-installer:
    name: Package installer (${{ matrix.platform }})
    runs-on: ubuntu-latest
    needs: [build-tui, build-wheel]
    if: always() && needs.build-wheel.result == 'success'
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - tui_artifact: sediman-tui-aarch64-macos
            platform: aarch64-macos
          - tui_artifact: sediman-tui-x86_64-macos
            platform: x86_64-macos
          - tui_artifact: sediman-tui-x86_64-linux
            platform: x86_64-linux
    steps:
      - uses: actions/checkout@v4
      - name: Download TUI artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.tui_artifact }}
          path: bundle/
        continue-on-error: true
      - name: Check artifact exists
        id: check
        run: |
          if [ ! -f "bundle/${{ matrix.tui_artifact }}.tar.gz" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::warning::TUI artifact ${{ matrix.tui_artifact }} not available, skipping"
          fi
      - uses: actions/download-artifact@v4
        if: steps.check.outputs.skip != 'true'
        with:
          name: python-wheel
          path: bundle/wheel/
      - name: Create bundle
        if: steps.check.outputs.skip != 'true'
        run: |
          mkdir -p release
          cd bundle
          tar xzf ${{ matrix.tui_artifact }}.tar.gz
          cd ..
          cp bundle/bin/terminator release/ || cp bundle/bin/sediman-tui release/terminator
          cp bundle/wheel/*.whl release/
          cp scripts/install.sh release/
          cp scripts/uninstall.sh release/
          cd release && tar czf sediman-${{ github.ref_name }}-${{ matrix.platform }}.tar.gz *
      - uses: actions/upload-artifact@v4
        if: steps.check.outputs.skip != 'true'
        with:
          name: sediman-${{ matrix.platform }}
          path: release/sediman-${{ github.ref_name }}-${{ matrix.platform }}.tar.gz

  publish-github:
    name: Publish to GitHub Releases
    runs-on: ubuntu-latest
    needs: [build-installer, build-wheel]
    if: always() && needs.build-wheel.result == 'success'
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: sediman-*
          path: artifacts/
          merge-multiple: true
        continue-on-error: true
      - uses: actions/download-artifact@v4
        with:
          name: python-wheel
          path: artifacts/
      - name: List artifacts
        run: ls -la artifacts/ || true
      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum *.tar.gz *.whl > checksums.txt 2>/dev/null || true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.tar.gz
            artifacts/*.whl
            artifacts/checksums.txt
          generate_release_notes: true

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build-wheel]
    if: always() && needs.build-wheel.result == 'success'
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-wheel
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  publish-docker:
    name: Publish Docker image to GHCR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            latest
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
