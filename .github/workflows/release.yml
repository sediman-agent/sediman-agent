name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

jobs:
  release-tui:
    name: Build & release TUI (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-latest
            platform: aarch64-macos
          - target: x86_64-apple-darwin
            runner: macos-13
            platform: x86_64-macos
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            platform: x86_64-linux
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Build
        run: cargo build --release -p sediman-tui --target ${{ matrix.target }}
      - name: Package
        run: |
          mkdir -p dist/bin
          cp target/${{ matrix.target }}/release/sediman-tui dist/bin/terminator
          cd dist && tar czf sediman-${{ github.ref_name }}-${{ matrix.platform }}.tar.gz bin/
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/sediman-${{ github.ref_name }}-${{ matrix.platform }}.tar.gz
          generate_release_notes: true

  release-wheel:
    name: Build & release Python wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - name: Build wheel
        run: uv build
      - name: Generate checksums
        run: cd dist && sha256sum *.whl > checksums.txt
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.whl
            dist/checksums.txt
          generate_release_notes: true

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [release-wheel]
    if: always() && needs.release-wheel.result == 'success'
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-wheel
          path: dist/
        continue-on-error: true
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  publish-docker:
    name: Publish Docker image to GHCR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            latest
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
