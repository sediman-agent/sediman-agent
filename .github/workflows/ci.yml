name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typescript:
    name: TypeScript tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.1
      - name: Install dependencies
        run: bun install
      - name: Run TypeScript tests
        working-directory: ./packages/app
        run: bun run test
      - name: Build Electron app
        working-directory: ./packages/app
        run: bun run build

  server-tests:
    name: Server tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.1
      - name: Install dependencies
        run: bun install
      - name: Run server tests
        working-directory: .
        run: bun test packages/server/tests --exclude vendor --exclude skills
